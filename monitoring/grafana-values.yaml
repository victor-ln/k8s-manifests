adminPassword: "admin"
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
    - name: InfluxDB
      # UID fixo para o dashboard provisionado referenciar de forma determinística
      uid: influxdb
      type: influxdb
      access: proxy
      url: http://influxdb-influxdb2.monitoring.svc.cluster.local:80
      jsonData:
        version: Flux
        organization: "minha-empresa"
        defaultBucket: "k6"
      secureJsonData:
        token: "token-secreto-v2-xyz"
      isDefault: true

# Provisionamento de dashboards: o Grafana carrega qualquer .json no path abaixo
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
    - name: 'default'
      orgId: 1
      folder: 'k6'
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /var/lib/grafana/dashboards/default

# Monta o ConfigMap 'k6-dashboard' (criado via `make grafana-dashboard-config`)
# dentro do path do provider acima. Precisa existir ANTES do `helm install grafana`.
dashboardsConfigMaps:
  default: k6-dashboard
