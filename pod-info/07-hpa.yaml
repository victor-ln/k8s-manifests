apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-podinfo-hpa
  namespace: prod-apps
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-podinfo
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50